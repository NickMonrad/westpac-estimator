version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      server-deps:
        patterns:
          - "*"
        dependency-type: production
      client-deps:
        patterns:
          - "*"
        dependency-type: development
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
