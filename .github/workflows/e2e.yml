name: E2E Tests

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: monrad_estimator
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/monrad_estimator
      JWT_SECRET: ci-test-secret-for-github-actions-32chars
      NODE_ENV: test
      PORT: 3001
      CLIENT_URL: http://localhost:5173
      TEST_EMAIL: test@example.com
      TEST_PASSWORD: password123

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Audit dependencies ───────────────────────────────────────
      - name: Audit dependencies
        run: |
          cd server && npm audit --audit-level=high
          cd ../client && npm audit --audit-level=high
        continue-on-error: true  # Don't fail CI on audit warnings initially

      # ── Install all workspace dependencies at once ──────────────
      - name: Install all dependencies
        run: npm ci

      # ── TypeScript type-checking ──────────────────────────────────
      - name: TypeScript check (client)
        working-directory: client
        run: npm run typecheck

      - name: TypeScript check (server)
        working-directory: server
        run: npm run typecheck

      # ── ESLint ──────────────────────────────────────────────────
      - name: Lint (client)
        working-directory: client
        run: npm run lint

      - name: Lint (server)
        working-directory: server
        run: npm run lint

      # ── Server unit tests ────────────────────────────────────────
      - name: Server unit tests
        working-directory: server
        run: npm test

      # ── Server ──────────────────────────────────────────────────
      - name: Run database migrations
        working-directory: server
        run: npx prisma migrate deploy

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      - name: Seed database (creates E2E test user)
        working-directory: server
        run: npx tsx prisma/seed.ts

      - name: Verify seed user exists
        run: |
          PGPASSWORD=postgres psql -U postgres -h localhost -d monrad_estimator \
            -c 'SELECT email, length(password) as pwd_len FROM "User" WHERE email = $$test@example.com$$;'

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Start API server
        working-directory: server
        run: node dist/index.js &

      # ── Client ──────────────────────────────────────────────────
      - name: Build client
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001

      - name: Serve client build
        working-directory: client
        run: npx vite preview --port 5173 --host &

      # ── Wait for servers ─────────────────────────────────────────
      - name: Wait for API and client to be ready
        run: npx --yes wait-on http://localhost:3001/health http://localhost:5173 --timeout 30000

      - name: Smoke test API login
        run: |
          echo "Health check:"
          curl -s http://localhost:3001/health
          echo ""
          echo "Login response:"
          curl -s -w "\nHTTP %{http_code}" -X POST http://localhost:3001/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"test@example.com","password":"password123"}'

      # ── Playwright ───────────────────────────────────────────────
      - name: Install Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test --grep-invert @screenshots
        env:
          BASE_URL: http://localhost:5173

      # ── Artifacts ────────────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.sha }}
          path: e2e/playwright-report/
          retention-days: 14
