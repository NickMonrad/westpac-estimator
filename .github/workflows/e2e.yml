name: E2E Tests

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: monrad_estimator
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/monrad_estimator
      JWT_SECRET: ci-test-secret
      PORT: 3001
      CLIENT_URL: http://localhost:5173
      TEST_EMAIL: test@example.com
      TEST_PASSWORD: password123

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Server ──────────────────────────────────────────────────
      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run database migrations
        working-directory: server
        run: npx prisma migrate deploy

      - name: Seed database (creates E2E test user)
        working-directory: server
        run: npx tsx prisma/seed.ts

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Start API server
        working-directory: server
        run: node dist/index.js &

      # ── Client ──────────────────────────────────────────────────
      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001

      - name: Serve client build
        run: npx --yes serve -s client/dist -l 5173 &

      # ── Wait for servers ─────────────────────────────────────────
      - name: Wait for API and client to be ready
        run: npx --yes wait-on http://localhost:3001/health http://localhost:5173 --timeout 30000

      # ── Playwright ───────────────────────────────────────────────
      - name: Install Playwright dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Chromium
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        run: npx playwright test
        env:
          BASE_URL: http://localhost:5173

      # ── Artifacts ────────────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
